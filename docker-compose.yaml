services:
  postgres:
    image: postgres:16
    container_name: stockit-postgres
    environment:
      POSTGRES_USER: stockit
      POSTGRES_PASSWORD: stockit
      POSTGRES_DB: stockit
    ports:
      - "5432:5432"
    volumes:
      - stockit_pg_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: stockit-redis
    ports:
      - "6379:6379"
volumes:
  stockit_pg_data: