version: '3'

vars:
  PRODUCTION_DB_DSN: '{{.PRODUCTION_DB_DSN | default ""}}'

tasks:
  help:
    desc: print this help message
    cmds:
    - task --list-all
    silent: true

  confirm:
    desc: confirmation prompt
    cmds:
    - |
      echo -n 'Are you sure? [y/N] ' && read ans && [ ${ans:-N} = y ]
    silent: true
    internal: true

  run:
    desc: run the cmd/stockit application
    cmds:
    - go run ./cmd/stockit

  migrations:new:
    desc: create a new database migration
    vars:
      NAME: '{{.name | default ""}}'
    cmds:
    - |
      if [ -z "{{.NAME}}" ]; then
        echo "Error: name parameter is required"
        echo "Usage: task migrations:new name=migration_name"
        exit 1
      fi
    - echo 'Creating migration file for {{.NAME}}...'
    - tern new -m ./internal/database/migrations {{.NAME}}

  migrations:up:
    desc: apply all up database migrations
    deps: [ confirm ]
    cmds:
    - echo 'Running up migrations...'
    - tern migrate -m ./internal/database/migrations --conn-string {{.PRODUCTION_DB_DSN}}

  tidy:
    desc: format all .go files, and tidy and vendor module dependencies
    cmds:
    - echo 'Formatting .go files...'
    - go fmt ./...
    - echo 'Tidying module dependencies...'
    - go mod tidy
    - echo 'Verifying dependencies...'
    - go mod verify

  test:
    desc: run all tests
    cmds:
    - go test ./... -count=1

  test:race:
    desc: run all tests with race detector (requires CGO)
    cmds:
    - go test ./... -race -count=1

  test:cache:
    desc: run cache tests only
    cmds:
    - go test ./internal/cache/... -v

  lint:
    desc: run golangci-lint
    cmds:
    - golangci-lint run ./...

  check:
    desc: run tests and lint
    cmds:
    - task: test
    - task: lint
